# tmux v2.0 installation steps for Ubuntu 14.04 (Trusty Tahr)
# tmux -V
# sudo apt-get update
# sudo apt-get install -y python-software-properties software-properties-common
# sudo add-apt-repository -y ppa:pi-rho/dev
# sudo apt-get update
# sudo apt-get install -y tmux
# tmux -V

if-shell "uname | grep -q Darwin" "set-option -g default-shell /usr/local/bin/fish" "set-option -g default-shell /usr/bin/fish"

# use UTF8
# set -g utf8
# set-window-option -g utf8 on

# make tmux display things in 256 colors
set -g default-terminal "tmux-256color"

# set scrollback history to 10000 (10k)
set -g history-limit 10000

# set Ctrl-a as the default prefix key combination
# and unbind C-b to free it up
set -g prefix C-a
unbind C-b

# use send-prefix to pass C-a through to application
bind C-a send-prefix

# enable vi mode
set-window-option -g mode-keys vi

# shorten command delay
set -sg escape-time 1

# set window and pane index to 1 (0 by default)
set-option -g base-index 1
setw -g pane-base-index 1

# reload ~/.tmux.conf using PREFIX r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Set easier window split keys
bind-key v split-window -h
bind-key h split-window -v

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift+Arrow L/R to switch windows (tabs)
bind -n S-Left previous-window
bind -n S-Right next-window

# Alt+number to switch to window (tabs)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

# j/k to scroll up/down in copy mode
bind j copy-mode \; send-keys -X page-down
bind k copy-mode \; send-keys -X page-up

# Enable automatic window renaming (basename of current pane's directory)
setw -g automatic-rename on
setw -g automatic-rename-format '#{=4:#{b:pane_current_path}}'

# Alt+z to zoom/unzoom current pane (no prefix)
bind -n M-z resize-pane -Z

# Copy mouse selection to Wayland clipboard
bind -n MouseDragEnd1Pane copy-mode \; send-keys -X copy-pipe-and-cancel "wl-copy"

# Alt+s to enter copy mode and search backward (no prefix)
bind -n M-s copy-mode \; command-prompt -T search -p "(search up)" "send-keys -X search-backward '%%'"

# Make the current window the first window
bind T swap-window -t 1

# Mouse Mode
set-option -g mouse on
set -g history-limit 10000

# ----------------------
# set some pretty colors
# ----------------------
# set pane colors - hilight the active pane
#set-option -g pane-border-fg colour240
#set-option -g pane-active-border-fg cyan

# colorize messages in the command line
#set-option -g message-bg black #base02
#set-option -g message-fg brightred #orange

# ----------------------
# Status Bar
# -----------------------
set-option -g status on                # turn the status bar on
# set -g status-utf8 on                  # set utf-8 for the status bar
set -g status-interval 5               # set update frequencey (default 15 seconds)
set -g status-justify left             # left align window list for more space
# set-option -g status-position top    # position the status bar at top of screen

# visual notification of activity in other windows
setw -g monitor-activity on
set -g visual-activity on


# set color for status bar
set-option -g status-bg colour235 #base02
set-option -g status-fg yellow #yellow
#set-option -g status-attr dim

# set window list colors - red for active and cyan for inactive
#set-window-option -g window-status-fg white #base0
#set-window-option -g window-status-bg colour236
#set-window-option -g window-status-attr dim

#set-window-option -g window-status-current-fg brightgreen #brightred #orange
#set-window-option -g window-status-current-bg colour236
#set-window-option -g window-status-current-attr bright

# hide session name and username to save space
set -g status-left ''
set -g status-right "#[fg=white]RAM #(/usr/bin/free | /usr/bin/awk 'NR==2 {printf \"%.0f%%\", $3/$2*100}') LA #(/usr/bin/awk '{print $1}' /proc/loadavg)#[default]"
set -g status-left-length 70

# Fuzzy dir history picker (mirrors fish Ctrl+g, works in any app)
# Tab after selecting a dir opens a second picker to also select a file
bind -n M-c run-shell '~/.config/tmux/scripts/fuzzy_insert_path.sh "#{pane_id}"'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-copycat'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
